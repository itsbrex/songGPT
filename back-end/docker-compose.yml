version: "3.3"

services:
  songgpt-api:
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - ./data:/data
    ports:
      - 8080:8080
    environment:
      LOGGER: uvicorn
      CLAUDE_BIN: ${CLAUDE_BIN:-claude}
      CLAUDE_MODEL: ${CLAUDE_MODEL:-sonnet}
      DATABASE_PATH: /data/songgpt.sqlite3
      SONGGPT_STORAGE_DIR: /data/storage
